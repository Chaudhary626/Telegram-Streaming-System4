{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block content %}
<div class="card" style="max-width:380px;margin:8vh auto">
  <h1>Sign in</h1>
  <p class="muted">Streaming system panel</p>
  {% if error %}<p style="color:var(--bad)">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <input type="hidden" name="next" value="{{ next }}">
    <label>Username</label>
    <input name="username" autocomplete="username" required>
    <label>Password</label>
    <input name="password" type="password" autocomplete="current-password" required>
    <div style="margin-top:16px"><button class="btn" type="submit">Sign in</button></div>
  </form>
</div>
{% endblock %}
