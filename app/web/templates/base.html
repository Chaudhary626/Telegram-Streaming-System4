<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Streaming Panel{% endblock %}</title>
  <style>
    :root{--bg:#0f1220;--card:#1a1f33;--accent:#5b8cff;--text:#e6e9f2;--muted:#9aa3bd;--ok:#3ecf8e;--bad:#ff5d6c;--warn:#ffb454;}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
    a{color:var(--accent);text-decoration:none}
    .wrap{max-width:1100px;margin:0 auto;padding:24px}
    .nav{display:flex;gap:16px;align-items:center;padding:14px 24px;background:var(--card);border-bottom:1px solid #262c45;flex-wrap:wrap}
    .nav .brand{font-weight:700;margin-right:auto}
    .card{background:var(--card);border:1px solid #262c45;border-radius:14px;padding:20px;margin-bottom:18px}
    .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
    .stat{font-size:30px;font-weight:700}
    .muted{color:var(--muted);font-size:13px}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:10px;border-bottom:1px solid #262c45;font-size:14px}
    th{color:var(--muted);font-weight:600}
    input,select,textarea{background:#0f1426;border:1px solid #2c3350;color:var(--text);border-radius:8px;padding:9px 11px;width:100%;font-size:14px}
    label{display:block;font-size:13px;color:var(--muted);margin:8px 0 4px}
    .btn{display:inline-block;background:var(--accent);color:#fff;border:0;border-radius:8px;padding:9px 14px;cursor:pointer;font-size:14px}
    .btn.ghost{background:transparent;border:1px solid #2c3350;color:var(--text)}
    .btn.bad{background:var(--bad)} .btn.ok{background:var(--ok)}
    .badge{padding:3px 8px;border-radius:999px;font-size:12px}
    .badge.pending{background:#3a2f12;color:var(--warn)}
    .badge.approved{background:#10301f;color:var(--ok)}
    .badge.rejected{background:#3a1418;color:var(--bad)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
    form.inline{display:inline}
    h1{font-size:22px} h2{font-size:17px;margin-top:0}
  </style>
</head>
<body>
  {% block nav %}{% endblock %}
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
